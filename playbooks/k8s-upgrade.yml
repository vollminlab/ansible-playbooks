- name: Upgrade worker nodes
  hosts: workers
  serial: 1
  become: true
  vars:
    short_name: "{{ inventory_hostname | regex_replace('\\.vollminlab\\.com$', '') }}"
  tasks:
    - name: Update kubernetes apt source
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ target_minor }}/deb/ /\n"

    - name: apt-get update
      apt:
        update_cache: yes

    - name: Unhold kubeadm
      command: apt-mark unhold kubeadm

    - name: Install kubeadm {{ target_version }}
      apt:
        name: "kubeadm={{ target_version }}-*"
        state: present

    - name: Hold kubeadm
      command: apt-mark hold kubeadm

    - name: Run kubeadm upgrade node
      command: kubeadm upgrade node
      changed_when: true

    - name: Evict kyverno-admission-controller from {{ short_name }} before drain
      shell: |
        pod=$(kubectl get pods -n kyverno \
          -l app.kubernetes.io/component=admission-controller \
          -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.nodeName}{"\n"}{end}' \
          | awk -v node="{{ short_name }}" '$2 == node {print $1}' | head -1)
        if [ -n "$pod" ]; then
          kubectl delete pod -n kyverno "$pod"
          echo "deleted:$pod"
        else
          echo "none"
        fi
      register: kyverno_evict
      delegate_to: localhost
      become: false
      changed_when: "'deleted:' in kyverno_evict.stdout"

    - name: Wait for kyverno-admission-controller deployment to be fully ready
      command: kubectl rollout status deployment/kyverno-admission-controller -n kyverno --timeout=120s
      delegate_to: localhost
      become: false
      when: "'deleted:' in kyverno_evict.stdout"

    - name: Drain {{ short_name }}
      command: kubectl drain {{ short_name }} --ignore-daemonsets --delete-emptydir-data --force --disable-eviction
      delegate_to: localhost
      become: false

    - name: Unhold kubelet and kubectl
      command: apt-mark unhold kubelet kubectl

    - name: Install kubelet and kubectl {{ target_version }}
      apt:
        name:
          - "kubelet={{ target_version }}-*"
          - "kubectl={{ target_version }}-*"
        state: present

    - name: Hold kubelet and kubectl
      command: apt-mark hold kubelet kubectl

    - name: Restart kubelet
      systemd:
        name: kubelet
        daemon_reload: yes
        state: restarted

    - name: Uncordon {{ short_name }}
      command: kubectl uncordon {{ short_name }}
      delegate_to: localhost
      become: false
      register: uncordon_result
      until: uncordon_result.rc == 0
      retries: 10
      delay: 15

    - name: Wait for {{ short_name }} to be Ready
      command: kubectl wait --for=condition=Ready node/{{ short_name }} --timeout=30s
      delegate_to: localhost
      become: false
      register: wait_result
      until: wait_result.rc == 0
      retries: 12
      delay: 15

    - name: Wait for Longhorn instance manager pod to be Running on {{ short_name }}
      shell: >
        kubectl get pods -n longhorn-system
        -l 'longhorn.io/component=instance-manager,longhorn.io/node={{ short_name }}'
        --no-headers 2>/dev/null
        | awk '$3=="Running"{c++} END{print c+0}'
      register: lh_im_running
      until: lh_im_running.stdout | trim | int > 0
      retries: 20
      delay: 15
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Get current Longhorn instance manager pod IPs on {{ short_name }}
      shell: >
        kubectl get pods -n longhorn-system
        -l 'longhorn.io/component=instance-manager,longhorn.io/node={{ short_name }}'
        -o jsonpath='{range .items[*]}{.status.podIP}{"\n"}{end}'
        2>/dev/null
      register: longhorn_im_ips
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Clean up stale Longhorn iSCSI sessions on {{ short_name }}
      shell: |
        cleaned=0
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          portal=$(echo "$line" | awk '{split($3, a, ":"); print a[1]}')
          iqn=$(echo "$line" | awk '{print $4}')
          echo "$iqn" | grep -q 'iqn.2019-10.io.longhorn' || continue
          matched=0
          for ip in $LH_IM_IPS; do
            [ "$ip" = "$portal" ] && matched=1 && break
          done
          [ "$matched" -eq 1 ] && continue
          iscsiadm -m node -T "$iqn" -p "$portal":3260 --logout 2>/dev/null || true
          iscsiadm -m node -T "$iqn" -p "$portal":3260 --op=delete 2>/dev/null || true
          cleaned=$((cleaned + 1))
        done < <(iscsiadm -m session 2>/dev/null || true)
        echo "cleaned=$cleaned"
      args:
        executable: /bin/bash
      environment:
        LH_IM_IPS: "{{ longhorn_im_ips.stdout_lines | join(' ') }}"
      register: iscsi_cleanup
      changed_when: "'cleaned=0' not in iscsi_cleanup.stdout"

    - name: Wait for all Longhorn volumes to be healthy (up to 30 min)
      shell: |
        unhealthy=$(kubectl get volumes.longhorn.io -A --no-headers \
          -o custom-columns='ROBUSTNESS:.status.robustness' | grep -v healthy | wc -l)
        [ "$unhealthy" -eq 0 ] && echo "0" && exit 0
        sched_fail=0
        while IFS= read -r vol; do
          reason=$(kubectl get volume.longhorn.io "$vol" -n longhorn-system \
            -o jsonpath='{.status.conditions[?(@.type=="Scheduled")].reason}' 2>/dev/null)
          [ "$reason" = "ReplicaSchedulingFailure" ] && sched_fail=$((sched_fail + 1))
        done < <(kubectl get volumes.longhorn.io -A --no-headers \
          -o jsonpath='{range .items[?(@.status.robustness!="healthy")]}{.metadata.name}{"\n"}{end}')
        [ "$sched_fail" -eq "$unhealthy" ] && echo "0" && exit 0
        echo "$unhealthy"
      args:
        executable: /bin/bash
      register: longhorn_degraded
      until: longhorn_degraded.stdout | trim == "0"
      retries: 60
      delay: 30
      delegate_to: localhost
      become: false
      ignore_errors: true

    - name: Report volumes skipped due to ReplicaSchedulingFailure (insufficient storage)
      shell: |
        kubectl get volumes.longhorn.io -A --no-headers \
          -o jsonpath='{range .items[?(@.status.robustness!="healthy")]}{.metadata.name}{"\n"}{end}' | \
          while IFS= read -r vol; do
            reason=$(kubectl get volume.longhorn.io "$vol" -n longhorn-system \
              -o jsonpath='{.status.conditions[?(@.type=="Scheduled")].reason}' 2>/dev/null)
            [ "$reason" = "ReplicaSchedulingFailure" ] && echo "$vol"
          done || true
      args:
        executable: /bin/bash
      register: sched_fail_vols
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Warn about scheduling failure volumes (cluster lacks storage for 3rd replica)
      debug:
        msg: "WARNING: {{ item }} is degraded due to ReplicaSchedulingFailure — cluster lacks storage for a 3rd replica, proceeding"
      loop: "{{ sched_fail_vols.stdout_lines }}"
      when: sched_fail_vols.stdout_lines | length > 0

    - name: Relocate stopped replicas stuck on disk-pressure nodes
      shell: |
        relocated=0
        while IFS=$'\t' read -r name state node; do
          [ "$state" = "stopped" ] || continue
          sched=$(kubectl get nodes.longhorn.io "$node" -n longhorn-system \
            -o jsonpath='{range .status.diskStatus.*}{.conditions[?(@.type=="Schedulable")].status}{end}' 2>/dev/null)
          [ "$sched" = "False" ] || continue
          kubectl delete replica.longhorn.io "$name" -n longhorn-system --ignore-not-found
          relocated=$((relocated + 1))
        done < <(kubectl get replicas.longhorn.io -n longhorn-system \
          -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.currentState}{"\t"}{.spec.nodeID}{"\n"}{end}')
        echo "$relocated"
      args:
        executable: /bin/bash
      register: relocated_count
      delegate_to: localhost
      become: false
      changed_when: relocated_count.stdout | trim | int > 0
      when: longhorn_degraded.failed

    - name: Wait for Longhorn volumes after replica relocation (up to 15 min)
      shell: >
        kubectl get volumes.longhorn.io -A --no-headers
        -o custom-columns='ROBUSTNESS:.status.robustness'
        | grep -v healthy | wc -l
      register: longhorn_degraded_post
      until: longhorn_degraded_post.stdout | trim == "0"
      retries: 30
      delay: 30
      delegate_to: localhost
      become: false
      ignore_errors: true
      when: longhorn_degraded.failed and (relocated_count.changed | default(false))

    - name: Fail if any Longhorn volumes are faulted
      shell: >
        kubectl get volumes.longhorn.io -A --no-headers
        -o custom-columns='ROBUSTNESS:.status.robustness'
        | grep faulted | wc -l
      register: longhorn_faulted
      failed_when: longhorn_faulted.stdout | trim | int > 0
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Report any volumes still degraded after wait (non-faulted, proceeding)
      shell: >
        kubectl get volumes.longhorn.io -A --no-headers
        -o custom-columns='ROBUSTNESS:.status.robustness'
        | grep -v healthy | wc -l
      register: longhorn_still_degraded
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Warn if volumes still degraded but not faulted
      debug:
        msg: "WARNING: {{ longhorn_still_degraded.stdout | trim }} volume(s) still degraded — no faulted volumes, proceeding to next node"
      when: longhorn_still_degraded.stdout | trim | int > 0
