---
# Run one hop at a time from ~/ansible-playbooks/:
#   ansible-playbook playbooks/k8s-upgrade.yml -e "target_version=1.33.12 target_minor=1.33"
#   ansible-playbook playbooks/k8s-upgrade.yml -e "target_version=1.34.8  target_minor=1.34"
#   ansible-playbook playbooks/k8s-upgrade.yml -e "target_version=1.35.5  target_minor=1.35"
#   ansible-playbook playbooks/k8s-upgrade.yml -e "target_version=1.36.1  target_minor=1.36"

- name: Upgrade first control plane node
  hosts: k8scp01.vollminlab.com
  serial: 1
  become: true
  tasks:
    - name: Update kubernetes apt source
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ target_minor }}/deb/ /\n"

    - name: apt-get update
      apt:
        update_cache: yes

    - name: Unhold kubeadm
      command: apt-mark unhold kubeadm

    - name: Install kubeadm {{ target_version }}
      apt:
        name: "kubeadm={{ target_version }}-*"
        state: present

    - name: Hold kubeadm
      command: apt-mark hold kubeadm

    - name: Run kubeadm upgrade apply
      command: kubeadm upgrade apply v{{ target_version }} --yes
      register: upgrade_apply
      changed_when: true

    - name: Show upgrade apply output
      debug:
        var: upgrade_apply.stdout_lines

    - name: Rebind etcd metrics to 0.0.0.0 (kubeadm upgrade resets this to 127.0.0.1)
      replace:
        path: /etc/kubernetes/manifests/etcd.yaml
        regexp: '--listen-metrics-urls=http://127\.0\.0\.1:2381'
        replace: '--listen-metrics-urls=http://0.0.0.0:2381'

    - name: Verify etcd metrics rebound to 0.0.0.0
      command: grep -q 'listen-metrics-urls=http://0.0.0.0:2381' /etc/kubernetes/manifests/etcd.yaml
      changed_when: false

    - name: Rebind kube-controller-manager metrics to 0.0.0.0
      replace:
        path: /etc/kubernetes/manifests/kube-controller-manager.yaml
        regexp: '--bind-address=127\.0\.0\.1'
        replace: '--bind-address=0.0.0.0'

    - name: Verify kube-controller-manager metrics rebound to 0.0.0.0
      command: grep -q -- '--bind-address=0.0.0.0' /etc/kubernetes/manifests/kube-controller-manager.yaml
      changed_when: false

    - name: Rebind kube-scheduler metrics to 0.0.0.0
      replace:
        path: /etc/kubernetes/manifests/kube-scheduler.yaml
        regexp: '--bind-address=127\.0\.0\.1'
        replace: '--bind-address=0.0.0.0'

    - name: Verify kube-scheduler metrics rebound to 0.0.0.0
      command: grep -q -- '--bind-address=0.0.0.0' /etc/kubernetes/manifests/kube-scheduler.yaml
      changed_when: false

    - name: Harden kube-apiserver liveness probe (kubeadm upgrade resets failureThreshold to 8)
      replace:
        path: /etc/kubernetes/manifests/kube-apiserver.yaml
        regexp: '(livenessProbe:\n\s+)failureThreshold: 8$'
        replace: '\g<1>failureThreshold: 24'

    - name: Verify kube-apiserver liveness probe hardened to failureThreshold 24
      shell: "grep -A1 'livenessProbe:' /etc/kubernetes/manifests/kube-apiserver.yaml | grep -q 'failureThreshold: 24'"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Harden etcd liveness probe (kubeadm upgrade resets failureThreshold to 8)
      replace:
        path: /etc/kubernetes/manifests/etcd.yaml
        regexp: '(livenessProbe:\n\s+)failureThreshold: 8$'
        replace: '\g<1>failureThreshold: 24'

    - name: Verify etcd liveness probe hardened to failureThreshold 24
      shell: "grep -A1 'livenessProbe:' /etc/kubernetes/manifests/etcd.yaml | grep -q 'failureThreshold: 24'"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Widen kube-controller-manager leader-election timeouts (kubeadm upgrade resets to defaults)
      replace:
        path: /etc/kubernetes/manifests/kube-controller-manager.yaml
        regexp: '^(?P<indent>\s*)- --leader-elect=true$\n(?!(?P=indent)- --leader-elect-lease-duration)'
        replace: |
          \g<indent>- --leader-elect=true
          \g<indent>- --leader-elect-lease-duration=30s
          \g<indent>- --leader-elect-renew-deadline=20s
          \g<indent>- --leader-elect-retry-period=4s

    - name: Verify kube-controller-manager leader-election timeouts present
      command: grep -q -- '--leader-elect-renew-deadline=20s' /etc/kubernetes/manifests/kube-controller-manager.yaml
      changed_when: false

    - name: Widen kube-scheduler leader-election timeouts (kubeadm upgrade resets to defaults)
      replace:
        path: /etc/kubernetes/manifests/kube-scheduler.yaml
        regexp: '^(?P<indent>\s*)- --leader-elect=true$\n(?!(?P=indent)- --leader-elect-lease-duration)'
        replace: |
          \g<indent>- --leader-elect=true
          \g<indent>- --leader-elect-lease-duration=30s
          \g<indent>- --leader-elect-renew-deadline=20s
          \g<indent>- --leader-elect-retry-period=4s

    - name: Verify kube-scheduler leader-election timeouts present
      command: grep -q -- '--leader-elect-renew-deadline=20s' /etc/kubernetes/manifests/kube-scheduler.yaml
      changed_when: false

    - name: Set GOMEMLIMIT on kube-apiserver (kubeadm upgrade drops the env block)
      replace:
        path: /etc/kubernetes/manifests/kube-apiserver.yaml
        regexp: '^(?P<indent>[ ]{4,})name: kube-apiserver\n(?:(?P=indent)env:\n(?P=indent)- name: GOMEMLIMIT\n(?P=indent)  value: [^\n]*\n)?'
        replace: |
          \g<indent>name: kube-apiserver
          \g<indent>env:
          \g<indent>- name: GOMEMLIMIT
          \g<indent>  value: "{{ apiserver_gomemlimit }}"

    - name: Verify GOMEMLIMIT present in kube-apiserver manifest
      shell: "grep -A1 'name: GOMEMLIMIT' /etc/kubernetes/manifests/kube-apiserver.yaml | grep -q '{{ apiserver_gomemlimit }}'"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Set kube-apiserver memory request/limit (kubeadm upgrade resets resources to cpu-only)
      replace:
        path: /etc/kubernetes/manifests/kube-apiserver.yaml
        regexp: '^(?P<indent>[ ]*)resources:\n(?P=indent)  requests:\n(?P=indent)    cpu: (?P<cpu>[^\n]+)\n(?:(?P=indent)    memory: [^\n]*\n)?(?:(?P=indent)  limits:\n(?P=indent)    memory: [^\n]*\n)?'
        replace: |
          \g<indent>resources:
          \g<indent>  requests:
          \g<indent>    cpu: \g<cpu>
          \g<indent>    memory: {{ apiserver_memory_request }}
          \g<indent>  limits:
          \g<indent>    memory: {{ apiserver_memory_limit }}

    - name: Verify kube-apiserver memory limit present in manifest
      shell: "grep -A2 'limits:' /etc/kubernetes/manifests/kube-apiserver.yaml | grep -q 'memory: {{ apiserver_memory_limit }}'"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Drain k8scp01
      command: kubectl drain k8scp01 --ignore-daemonsets --delete-emptydir-data --force --disable-eviction
      delegate_to: localhost
      become: false

    - name: Unhold kubelet and kubectl
      command: apt-mark unhold kubelet kubectl

    - name: Install kubelet and kubectl {{ target_version }}
      apt:
        name:
          - "kubelet={{ target_version }}-*"
          - "kubectl={{ target_version }}-*"
        state: present

    - name: Hold kubelet and kubectl
      command: apt-mark hold kubelet kubectl

    - name: Restart kubelet
      systemd:
        name: kubelet
        daemon_reload: yes
        state: restarted

    - name: Wait for k8scp01 API server to initialize after kubelet restart
      pause:
        seconds: 30

    - name: Uncordon k8scp01
      command: kubectl uncordon k8scp01
      delegate_to: localhost
      become: false
      register: uncordon_result
      until: uncordon_result.rc == 0
      retries: 10
      delay: 15

    - name: Wait for k8scp01 to be Ready
      command: kubectl wait --for=condition=Ready node/k8scp01 --timeout=30s
      delegate_to: localhost
      become: false
      register: wait_result
      until: wait_result.rc == 0
      retries: 12
      delay: 15

