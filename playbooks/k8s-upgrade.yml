---
# Run one hop at a time from ~/ansible-playbooks/:
#   ansible-playbook playbooks/k8s-upgrade.yml -e "target_version=1.33.12 target_minor=1.33"
#   ansible-playbook playbooks/k8s-upgrade.yml -e "target_version=1.34.8  target_minor=1.34"
#   ansible-playbook playbooks/k8s-upgrade.yml -e "target_version=1.35.5  target_minor=1.35"
#   ansible-playbook playbooks/k8s-upgrade.yml -e "target_version=1.36.1  target_minor=1.36"

- name: Upgrade first control plane node
  hosts: k8scp01.vollminlab.com
  serial: 1
  become: true
  tasks:
    - name: Update kubernetes apt source
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ target_minor }}/deb/ /\n"

    - name: apt-get update
      apt:
        update_cache: yes

    - name: Unhold kubeadm
      command: apt-mark unhold kubeadm

    - name: Install kubeadm {{ target_version }}
      apt:
        name: "kubeadm={{ target_version }}-*"
        state: present

    - name: Hold kubeadm
      command: apt-mark hold kubeadm

    - name: Run kubeadm upgrade apply
      command: kubeadm upgrade apply v{{ target_version }} --yes
      register: upgrade_apply
      changed_when: true

    - name: Show upgrade apply output
      debug:
        var: upgrade_apply.stdout_lines

    - name: Rebind etcd metrics to 0.0.0.0 (kubeadm upgrade resets this to 127.0.0.1)
      replace:
        path: /etc/kubernetes/manifests/etcd.yaml
        regexp: '--listen-metrics-urls=http://127\.0\.0\.1:2381'
        replace: '--listen-metrics-urls=http://0.0.0.0:2381'

    - name: Verify etcd metrics rebound to 0.0.0.0
      command: grep -q 'listen-metrics-urls=http://0.0.0.0:2381' /etc/kubernetes/manifests/etcd.yaml
      changed_when: false

    - name: Rebind kube-controller-manager metrics to 0.0.0.0
      replace:
        path: /etc/kubernetes/manifests/kube-controller-manager.yaml
        regexp: '--bind-address=127\.0\.0\.1'
        replace: '--bind-address=0.0.0.0'

    - name: Verify kube-controller-manager metrics rebound to 0.0.0.0
      command: grep -q -- '--bind-address=0.0.0.0' /etc/kubernetes/manifests/kube-controller-manager.yaml
      changed_when: false

    - name: Rebind kube-scheduler metrics to 0.0.0.0
      replace:
        path: /etc/kubernetes/manifests/kube-scheduler.yaml
        regexp: '--bind-address=127\.0\.0\.1'
        replace: '--bind-address=0.0.0.0'

    - name: Verify kube-scheduler metrics rebound to 0.0.0.0
      command: grep -q -- '--bind-address=0.0.0.0' /etc/kubernetes/manifests/kube-scheduler.yaml
      changed_when: false

    - name: Drain k8scp01
      command: kubectl drain k8scp01 --ignore-daemonsets --delete-emptydir-data --force --disable-eviction
      delegate_to: localhost
      become: false

    - name: Unhold kubelet and kubectl
      command: apt-mark unhold kubelet kubectl

    - name: Install kubelet and kubectl {{ target_version }}
      apt:
        name:
          - "kubelet={{ target_version }}-*"
          - "kubectl={{ target_version }}-*"
        state: present

    - name: Hold kubelet and kubectl
      command: apt-mark hold kubelet kubectl

    - name: Restart kubelet
      systemd:
        name: kubelet
        daemon_reload: yes
        state: restarted

    - name: Wait for k8scp01 API server to initialize after kubelet restart
      pause:
        seconds: 30

    - name: Uncordon k8scp01
      command: kubectl uncordon k8scp01
      delegate_to: localhost
      become: false
      register: uncordon_result
      until: uncordon_result.rc == 0
      retries: 10
      delay: 15

    - name: Wait for k8scp01 to be Ready
      command: kubectl wait --for=condition=Ready node/k8scp01 --timeout=30s
      delegate_to: localhost
      become: false
      register: wait_result
      until: wait_result.rc == 0
      retries: 12
      delay: 15

- name: Upgrade remaining control plane nodes
  hosts: k8scp02.vollminlab.com,k8scp03.vollminlab.com
  serial: 1
  become: true
  vars:
    short_name: "{{ inventory_hostname | regex_replace('\\.vollminlab\\.com$', '') }}"
  tasks:
    - name: Update kubernetes apt source
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ target_minor }}/deb/ /\n"

    - name: apt-get update
      apt:
        update_cache: yes

    - name: Unhold kubeadm
      command: apt-mark unhold kubeadm

    - name: Install kubeadm {{ target_version }}
      apt:
        name: "kubeadm={{ target_version }}-*"
        state: present

    - name: Hold kubeadm
      command: apt-mark hold kubeadm

    - name: Run kubeadm upgrade node
      command: kubeadm upgrade node
      changed_when: true

    - name: Rebind etcd metrics to 0.0.0.0 (kubeadm upgrade resets this to 127.0.0.1)
      replace:
        path: /etc/kubernetes/manifests/etcd.yaml
        regexp: '--listen-metrics-urls=http://127\.0\.0\.1:2381'
        replace: '--listen-metrics-urls=http://0.0.0.0:2381'

    - name: Verify etcd metrics rebound to 0.0.0.0
      command: grep -q 'listen-metrics-urls=http://0.0.0.0:2381' /etc/kubernetes/manifests/etcd.yaml
      changed_when: false

    - name: Rebind kube-controller-manager metrics to 0.0.0.0
      replace:
        path: /etc/kubernetes/manifests/kube-controller-manager.yaml
        regexp: '--bind-address=127\.0\.0\.1'
        replace: '--bind-address=0.0.0.0'

    - name: Verify kube-controller-manager metrics rebound to 0.0.0.0
      command: grep -q -- '--bind-address=0.0.0.0' /etc/kubernetes/manifests/kube-controller-manager.yaml
      changed_when: false

    - name: Rebind kube-scheduler metrics to 0.0.0.0
      replace:
        path: /etc/kubernetes/manifests/kube-scheduler.yaml
        regexp: '--bind-address=127\.0\.0\.1'
        replace: '--bind-address=0.0.0.0'

    - name: Verify kube-scheduler metrics rebound to 0.0.0.0
      command: grep -q -- '--bind-address=0.0.0.0' /etc/kubernetes/manifests/kube-scheduler.yaml
      changed_when: false

    - name: Drain {{ short_name }}
      command: kubectl drain {{ short_name }} --ignore-daemonsets --delete-emptydir-data --force --disable-eviction
      delegate_to: localhost
      become: false

    - name: Unhold kubelet and kubectl
      command: apt-mark unhold kubelet kubectl

    - name: Install kubelet and kubectl {{ target_version }}
      apt:
        name:
          - "kubelet={{ target_version }}-*"
          - "kubectl={{ target_version }}-*"
        state: present

    - name: Hold kubelet and kubectl
      command: apt-mark hold kubelet kubectl

    - name: Restart kubelet
      systemd:
        name: kubelet
        daemon_reload: yes
        state: restarted

    - name: Wait for {{ short_name }} API server to initialize after kubelet restart
      pause:
        seconds: 30

    - name: Uncordon {{ short_name }}
      command: kubectl uncordon {{ short_name }}
      delegate_to: localhost
      become: false
      register: uncordon_result
      until: uncordon_result.rc == 0
      retries: 10
      delay: 15

    - name: Wait for {{ short_name }} to be Ready
      command: kubectl wait --for=condition=Ready node/{{ short_name }} --timeout=30s
      delegate_to: localhost
      become: false
      register: wait_result
      until: wait_result.rc == 0
      retries: 12
      delay: 15

- name: Upgrade worker nodes
  hosts: workers
  serial: 1
  become: true
  vars:
    short_name: "{{ inventory_hostname | regex_replace('\\.vollminlab\\.com$', '') }}"
  tasks:
    - name: Update kubernetes apt source
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ target_minor }}/deb/ /\n"

    - name: apt-get update
      apt:
        update_cache: yes

    - name: Unhold kubeadm
      command: apt-mark unhold kubeadm

    - name: Install kubeadm {{ target_version }}
      apt:
        name: "kubeadm={{ target_version }}-*"
        state: present

    - name: Hold kubeadm
      command: apt-mark hold kubeadm

    - name: Run kubeadm upgrade node
      command: kubeadm upgrade node
      changed_when: true

    - name: Evict kyverno-admission-controller from {{ short_name }} before drain
      shell: |
        pod=$(kubectl get pods -n kyverno \
          -l app.kubernetes.io/component=admission-controller \
          -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.nodeName}{"\n"}{end}' \
          | awk -v node="{{ short_name }}" '$2 == node {print $1}' | head -1)
        if [ -n "$pod" ]; then
          kubectl delete pod -n kyverno "$pod"
          echo "deleted:$pod"
        else
          echo "none"
        fi
      register: kyverno_evict
      delegate_to: localhost
      become: false
      changed_when: "'deleted:' in kyverno_evict.stdout"

    - name: Wait for kyverno-admission-controller deployment to be fully ready
      command: kubectl rollout status deployment/kyverno-admission-controller -n kyverno --timeout=120s
      delegate_to: localhost
      become: false
      when: "'deleted:' in kyverno_evict.stdout"

    - name: Drain {{ short_name }}
      command: kubectl drain {{ short_name }} --ignore-daemonsets --delete-emptydir-data --force --disable-eviction
      delegate_to: localhost
      become: false

    - name: Unhold kubelet and kubectl
      command: apt-mark unhold kubelet kubectl

    - name: Install kubelet and kubectl {{ target_version }}
      apt:
        name:
          - "kubelet={{ target_version }}-*"
          - "kubectl={{ target_version }}-*"
        state: present

    - name: Hold kubelet and kubectl
      command: apt-mark hold kubelet kubectl

    - name: Restart kubelet
      systemd:
        name: kubelet
        daemon_reload: yes
        state: restarted

    - name: Uncordon {{ short_name }}
      command: kubectl uncordon {{ short_name }}
      delegate_to: localhost
      become: false
      register: uncordon_result
      until: uncordon_result.rc == 0
      retries: 10
      delay: 15

    - name: Wait for {{ short_name }} to be Ready
      command: kubectl wait --for=condition=Ready node/{{ short_name }} --timeout=30s
      delegate_to: localhost
      become: false
      register: wait_result
      until: wait_result.rc == 0
      retries: 12
      delay: 15

    - name: Wait for all Longhorn volumes to be healthy
      shell: >
        kubectl get volumes.longhorn.io -A --no-headers
        -o custom-columns='ROBUSTNESS:.status.robustness'
        | grep -v healthy | wc -l
      register: degraded_count
      until: degraded_count.stdout | trim == "0"
      retries: 120
      delay: 30
      delegate_to: localhost
      become: false
